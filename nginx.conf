server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPAルーティング: /auth/callback など全パスを index.html に渡す
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静的アセットは長期キャッシュ
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # gzip 圧縮
    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;
    gzip_min_length 1024;
}
